{% set name = "sgtlib" %}
{% set version = "3.8.5" %}
{% set python_min = "3.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sgtlib-{{ version }}.tar.gz
  sha256: a6bf14f1220a4b9dbfea23becd219708afd83f431c9f5a58a739bb28a1fb71a3

build:
  entry_points:
    - StructuralGT = sgtlib.entrypoints:main_gui
    - StructuralGT-cli = sgtlib.entrypoints:main_cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=82.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy ==2.4.6
    - pyside6 ==6.11.1
    - pillow ==12.2.0
    - opencv ==4.13.0
    - gsd ==5.0.1
    - matplotlib-base ==3.10.9
    - scipy ==1.17.1
    - pandas ==3.0.3
    - python-igraph ==1.0.0
    - networkx ==3.6.1
    - scikit-image ==0.26.0
    - requests ==2.34.1
    - packaging ==26.2
    - xlsxwriter ==3.2.9
    - scikit-learn ==1.9.0
    - gudhi ==3.12.0
  run_constrained:
    - ovito ==3.15.4

test:
  imports:
    - sgtlib
  commands:
    - pip check
    - StructuralGT-cli --help
  requires:
    - python {{ python_min }}
    - pip

about:
  summary: A software tool for graph theory analysis of microscopy images.
  home: https://github.com/owuordickson/structural-gt
  license: GPL-3.0-only
  license_file:
    - LICENSE
  description: A software tool for graph theory analysis of microscopy images.

extra:
  recipe-maintainers:
    - owuordickson
